<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Coach v2 — Rave & Crutchik</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a2e;--bg:#f0f2f8;--white:#fff;--cream:#f8f9fc;
  --blue:#2563eb;--blue-l:#eff6ff;--blue-m:#bfdbfe;
  --green:#16a34a;--red:#dc2626;--red-l:#fef2f2;
  --amber:#d97706;--purple:#7c3aed;--purple-l:#f5f3ff;
  --border:#e2e8f0;--shadow:0 1px 12px rgba(0,0,0,0.06);
  --serif:'DM Serif Display',Georgia,serif;--sans:'DM Sans',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh}
.header{background:white;border-bottom:1px solid var(--border);padding:0.7rem 1.25rem;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);position:sticky;top:0;z-index:50}
.logo{font-family:var(--serif);font-size:17px}.logo em{color:var(--blue);font-style:italic}
.day-pill{font-size:11px;background:var(--blue-l);color:var(--blue);padding:3px 10px;border-radius:99px;font-weight:500}
.hbtn{font-size:11px;padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:white;color:#64748b;cursor:pointer}
.hbtn:hover{background:var(--blue-l);color:var(--blue)}
.main{max-width:1080px;margin:0 auto;padding:1rem}
.tabs{display:flex;gap:6px;margin-bottom:0.85rem}
.tab{font-size:12px;padding:6px 16px;border-radius:99px;border:1px solid var(--border);background:white;color:#64748b;cursor:pointer;font-weight:500}
.tab.on{background:var(--ink);color:white;border-color:var(--ink)}
.bita-total{font-size:13px;color:#475569;line-height:1.7}
.bita-total strong{color:var(--ink)}
.hrs-title{font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px}
.hrs-table{border-collapse:collapse;font-size:12px}
.hrs-table th{font-size:10px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.4px;padding:5px 11px;border-bottom:1px solid var(--border);text-align:center;white-space:nowrap}
.hrs-table td{padding:5px 11px;text-align:center;border-bottom:1px solid #f1f5f9;white-space:nowrap}
.hrs-table .hl{text-align:left}
.hrs-zero{color:#cbd5e1}
.hrs-tot{font-weight:700;border-left:1px solid var(--border)}
.hrs-total-row td{font-weight:700;border-top:2px solid var(--border);border-bottom:none}

.tips-box{background:white;border:1px solid var(--border);border-radius:12px;padding:0.9rem 1rem;margin-bottom:0.85rem}
.tips-title{font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between}
.tips-refresh{font-size:11px;padding:3px 9px;border-radius:6px;border:1px solid var(--border);background:white;color:#64748b;cursor:pointer;font-weight:400;text-transform:none;letter-spacing:0}
.tips-refresh:hover{background:var(--blue-l);color:var(--blue)}
.tips-grid{display:flex;flex-direction:column;gap:6px}
.tip-item{display:flex;align-items:flex-start;gap:10px;padding:8px 11px;border-radius:8px;border:1px solid #e0e7ff;background:#f8f7ff;cursor:default}
.tip-item.clickable{cursor:pointer}
.tip-item.clickable:hover{border-color:var(--blue-m)}
.tip-ico{font-size:15px;flex-shrink:0;margin-top:1px}
.tip-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:#5b21b6;margin-bottom:2px}
.tip-text{font-size:12px;color:#475569;line-height:1.5}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:0.85rem}
.stat{background:white;border:1px solid var(--border);border-radius:9px;padding:9px 11px}
.stat-label{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.4px;font-weight:500;margin-bottom:2px}
.stat-val{font-size:19px;font-weight:700;color:var(--ink)}
.stat-sub{font-size:10px;color:#94a3b8;margin-top:1px}

.funnel{background:white;border:1px solid var(--border);border-radius:12px;padding:0.85rem;margin-bottom:0.85rem}
.funnel-stages{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.stage{border-radius:8px;padding:8px 5px;text-align:center;cursor:pointer;border:1.5px solid transparent;transition:all 0.15s}
.stage:hover{border-color:#cbd5e1}
.stage.active{border-color:var(--blue);background:var(--blue-l)}
.s-name{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;color:#64748b;margin-bottom:3px}
.s-num{font-size:18px;font-weight:700;color:var(--ink);line-height:1}
.s-pct{font-size:10px;color:#94a3b8;margin-top:1px}

.section-hdr{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.section-title{font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.6px}
.add-btn{font-size:12px;padding:5px 12px;border-radius:7px;border:none;background:var(--blue);color:white;cursor:pointer;font-weight:500;margin-left:auto}
.add-btn:hover{background:#1d4ed8}
.search-wrap{position:relative}
.search-wrap span{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:12px;color:#94a3b8}
#search-input{font-size:12px;padding:5px 10px 5px 26px;border:1px solid var(--border);border-radius:99px;outline:none;background:white;width:200px;font-family:var(--sans)}
.filter-btns{display:flex;gap:4px;flex-wrap:wrap}
.fb{font-size:11px;padding:3px 9px;border-radius:99px;border:1px solid var(--border);background:white;color:#64748b;cursor:pointer}
.fb.on{background:var(--blue);color:white;border-color:var(--blue)}

.table-wrap{background:white;border:1px solid var(--border);border-radius:12px;overflow-x:auto;margin-bottom:1.5rem}
.ctable{width:100%;border-collapse:collapse;min-width:640px}
.ctable th{font-size:10px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px;padding:8px 10px;background:#f8f9fc;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;cursor:pointer;user-select:none}
.ctable td{font-size:12px;padding:8px 10px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
.ctable tr:last-child td{border-bottom:none}
.ctable tbody tr{cursor:pointer}
.ctable tbody tr:hover td{background:#fafbfd}
.td-emp{font-weight:600;font-size:12px}
.td-cont{font-size:11px;color:#64748b;margin-top:1px}
.td-dias{font-size:11px;color:#94a3b8}
.td-dias.hot{color:var(--red);font-weight:600}
.badge{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500;white-space:nowrap}
.b-pc{background:#f1f5f9;color:#475569}.b-co{background:#dbeafe;color:#1e40af}
.b-re{background:#fef9c3;color:#854d0e}.b-ru{background:#f5f3ff;color:#6d28d9}
.b-pr{background:#fff7ed;color:#c2410c}.b-ga{background:#dcfce7;color:#166534}
.b-oh{background:#f3f4f6;color:#374151}.b-no{background:#fee2e2;color:#991b1b}
.b-ep{background:#dbeafe;color:#1e40af}.b-tm{background:#e0f2fe;color:#0369a1}
.timing-txt{font-size:10px;white-space:nowrap}

.overlay{display:none;position:fixed;inset:0;background:rgba(26,26,46,0.45);z-index:100;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:white;border-radius:14px;padding:1.4rem;width:560px;max-width:96vw;box-shadow:0 20px 60px rgba(0,0,0,0.18);margin-bottom:2rem}
.modal h3{font-family:var(--serif);font-size:20px;margin-bottom:0.4rem}
.field{margin-bottom:10px}
.field label{font-size:10px;color:#64748b;display:block;margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px}
.field input,.field select,.field textarea{width:100%;font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:7px;outline:none;font-family:var(--sans);background:var(--cream)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);background:white}
.field textarea{height:56px;resize:vertical}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.btn-c{font-size:13px;padding:7px 15px;border-radius:7px;border:1px solid var(--border);background:white;color:#64748b;cursor:pointer}
.btn-s{font-size:13px;padding:7px 15px;border-radius:7px;border:none;background:var(--blue);color:white;cursor:pointer;font-weight:500}
.btn-del{font-size:12px;padding:7px 13px;border-radius:7px;border:none;background:var(--red-l);color:var(--red);cursor:pointer;font-weight:500;margin-right:auto}
.toggle-link{font-size:12px;color:var(--blue);cursor:pointer;background:none;border:none;font-family:var(--sans);padding:2px 0}

.dsec{border:1px solid var(--border);border-radius:10px;margin-bottom:9px;overflow:hidden}
.dsec-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--cream);cursor:pointer;user-select:none}
.dsec-hdr .t{font-size:11px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:0.4px}
.dsec-body{padding:11px 12px;display:none}
.dsec.open .dsec-body{display:block}
.coach-block{background:#f8f7ff;border:1px solid #e0e7ff;border-radius:10px;padding:12px;margin-bottom:9px}
.coach-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.coach-hdr .t{font-size:11px;font-weight:600;color:#5b21b6;text-transform:uppercase;letter-spacing:0.5px}
.coach-reco{font-size:12px;color:#475569;line-height:1.55;margin-bottom:9px}
.coach-msg{background:#eff6ff;border:1px solid var(--blue-m);border-radius:8px;padding:11px 13px;font-size:13px;color:#1e40af;line-height:1.6;white-space:pre-wrap}
.coach-actions{display:flex;gap:6px;margin-top:8px}
.mini-btn{font-size:11px;padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:white;color:#475569;cursor:pointer;font-weight:500}
.mini-btn:hover{background:var(--blue-l);color:var(--blue)}
.mini-btn.primary{background:var(--blue);color:white;border-color:var(--blue)}
.mini-btn.primary:hover{background:#1d4ed8}
.spinner{width:13px;height:13px;border:2px solid #e2e8f0;border-top-color:var(--purple);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:-2px;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-line{font-size:12px;color:#94a3b8;padding:4px 0}
.hist-entry{padding:7px 10px;background:var(--cream);border-radius:8px;border:1px solid var(--border);margin-bottom:6px}
.hist-type{font-size:10px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:0.4px;display:inline}
.hist-date{font-size:10px;color:#94a3b8;display:inline;margin-left:6px}
.hist-text{font-size:12px;color:var(--ink);line-height:1.4;margin-top:2px}
.hist-add{display:flex;gap:6px;margin-top:8px}
.hist-sel{font-size:12px;padding:6px 7px;border:1px solid var(--border);border-radius:7px;outline:none;background:white}
.hist-input{flex:1;font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:7px;outline:none;font-family:var(--sans);background:white}
.fr-card{background:var(--cream);border-left:3px solid var(--purple);border-radius:8px;padding:9px 13px;margin-bottom:6px}
.fr-card .ft{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.fr-card .fi{font-size:12px;color:#475569;line-height:1.55;margin-bottom:3px}
.detail-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.detail-top select,.detail-top input[type=date]{font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:7px;background:var(--cream);outline:none;font-family:var(--sans)}
.score-pill{font-size:12px;font-weight:600;padding:3px 12px;border-radius:99px;margin-left:auto}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--ink);color:white;padding:8px 16px;border-radius:8px;font-size:12px;opacity:0;transition:opacity 0.3s;z-index:300;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}.funnel-stages{grid-template-columns:repeat(4,1fr);row-gap:6px}#search-input{width:140px}}
</style>
</head>
<body>
<div class="header">
  <div class="logo">Rave <em>&</em> Crutchik <span style="font-size:11px;color:#94a3b8;font-family:var(--sans);font-weight:400;margin-left:5px">Sales Coach v2</span></div>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="day-pill" id="day-pill"></span>
    <button class="hbtn" onclick="exportData()">⬇ Exportar</button>
    <button class="hbtn" onclick="openImport()">⬆ Importar</button>
  </div>
</div>

<div class="main">
  <div class="tabs">
    <button class="tab on" id="tab-pipeline" onclick="setView('pipeline')">📊 Pipeline</button>
    <button class="tab" id="tab-bitacora" onclick="setView('bitacora')">📓 Bitácora</button>
  </div>
  <div id="view-pipeline">
  <div class="tips-box">
    <div class="tips-title">
      <span>💡 Insights del coach</span>
      <button class="tips-refresh" onclick="renderTips();showToast('✅ Insights actualizados')">↻ Actualizar</button>
    </div>
    <div class="tips-grid" id="tips-grid"></div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="funnel">
    <div class="funnel-stages" id="funnel-stages"></div>
  </div>

  <div class="section-hdr">
    <div class="section-title">Pipeline</div>
    <div class="search-wrap"><span>🔍</span><input id="search-input" type="text" placeholder="Buscar..." oninput="renderContacts()"></div>
    <div class="filter-btns" id="filter-btns"></div>
    <button class="add-btn" onclick="openAdd()">+ Nuevo contacto</button>
  </div>

  <div class="table-wrap"><table class="ctable" id="clist"></table></div>
  </div><!-- /view-pipeline -->

  <div id="view-bitacora" style="display:none">
    <div class="tips-box" id="bita-resumen-interno"></div>
    <div class="section-hdr"><div class="section-title">Bitácora de trabajo con clientes</div></div>
    <div class="filter-btns" id="bita-clients" style="margin-bottom:7px"></div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:9px;flex-wrap:wrap" id="bita-period"></div>
    <div class="tips-box"><div class="bita-total" id="bita-summary"></div></div>
    <div class="table-wrap"><table class="ctable" id="bita-table"></table></div>
    <div class="tips-box">
      <div class="tips-title"><span id="b-form-title">+ Nueva entrada</span></div>
      <div class="field-row3">
        <div class="field"><label>Fecha</label><input id="b-fecha" type="date"></div>
        <div class="field"><label>Duración (min)</label><input id="b-min" type="number" step="15" placeholder="ej: 120"></div>
        <div class="field"><label>Lugar</label><input id="b-lugar" type="text" placeholder="ej: Oficinas cliente"></div>
      </div>
      <div class="field"><label>Reunión / Tema *</label><input id="b-tema" type="text" placeholder="ej: Taller de indicadores"></div>
      <div class="field"><label>Comentarios / Acuerdos</label><textarea id="b-com" placeholder="Qué se revisó, acuerdos, pendientes..."></textarea></div>
      <div class="field"><label>Participantes</label><input id="b-part" type="text" placeholder="ej: Roberto, Andrea"></div>
      <div style="display:flex;gap:8px;align-items:center"><button class="btn-s" id="b-save" onclick="addBita()">Guardar entrada</button><button class="btn-c" id="b-cancel" style="display:none" onclick="cancelBitaEdit()">Cancelar edición</button><span id="b-edit-hint" style="display:none;font-size:11px;color:var(--amber)">✏️ Editando entrada existente</span></div>
    </div>
  </div>
</div>

<!-- MODAL NUEVO CONTACTO (quick add) -->
<div class="overlay" id="add-overlay">
  <div class="modal" style="width:440px">
    <h3>Nuevo contacto</h3>
    <p style="font-size:12px;color:#94a3b8;margin-bottom:12px">Solo lo esencial. El resto lo completas después si hace falta.</p>
    <div class="field"><label>Empresa *</label><input id="a-emp" type="text" placeholder="Nombre empresa"></div>
    <div class="field-row">
      <div class="field"><label>Etapa</label>
        <select id="a-status"><option>Por contactar</option><option>Contactado</option><option>Respondió</option><option>Reunión</option><option>Propuesta</option><option>Ganado</option><option>Terminado</option><option>On hold</option><option>No</option></select>
      </div>
      <div class="field"><label>Canal</label>
        <select id="a-canal"><option value="">-</option><option>Email</option><option>LinkedIn</option><option>WhatsApp</option><option>Llamada</option><option>Referido</option><option>Reunión</option></select>
      </div>
    </div>
    <div class="field"><label>Próxima acción</label><input id="a-accion" type="text" placeholder="ej: escribir el jueves"></div>
    <button class="toggle-link" onclick="toggleAddMore()" id="add-more-link">+ Más campos (contacto, cargo, ciudad...)</button>
    <div id="add-more" style="display:none;margin-top:8px">
      <div class="field-row">
        <div class="field"><label>Contacto</label><input id="a-cont" type="text" placeholder="Nombre persona"></div>
        <div class="field"><label>Cargo</label><input id="a-cargo" type="text" placeholder="Cargo"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Ciudad</label><input id="a-ciudad" type="text"></div>
        <div class="field"><label>Email</label><input id="a-email" type="email"></div>
      </div>
      <div class="field"><label>Cliente de</label><select id="a-owner"><option value="">Sin asignar</option><option>Jael</option><option>Rafa</option></select></div>
      <div class="field"><label>Notas</label><textarea id="a-notas" placeholder="Contexto..."></textarea></div>
    </div>
    <div class="modal-btns">
      <button class="btn-c" onclick="closeAdd()">Cancelar</button>
      <button class="btn-s" onclick="saveAdd()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL DETALLE (todo en uno) -->
<div class="overlay" id="detail-overlay">
  <div class="modal" id="detail-modal"></div>
</div>

<!-- MODAL IMPORTAR -->
<div class="overlay" id="import-overlay">
  <div class="modal" style="width:480px">
    <h3>Importar datos</h3>
    <p style="font-size:12px;color:#64748b;margin-bottom:10px;line-height:1.5">Pega aquí un JSON con contactos.</p>
    <div class="field"><textarea id="import-text" style="height:140px" placeholder='{"contacts":[...]}'></textarea></div>
    <label style="display:flex;align-items:center;gap:7px;font-size:12px;color:#475569;cursor:pointer;margin-bottom:4px"><input type="checkbox" id="import-merge" checked style="width:auto"> <span><strong>Agregar</strong> al pipeline actual (desmarcar para reemplazar todo)</span></label>
    <div class="modal-btns">
      <button class="btn-c" onclick="closeImport()">Cancelar</button>
      <button class="btn-s" onclick="doImport()">Importar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
const DIAS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const UF=38500;
const STAGES=['Por contactar','Contactado','Respondió','Reunión','Propuesta','Ganado','Terminado'];
const ORD={'Reunión':0,'Respondió':1,'Propuesta':2,'En proceso':3,'Contactado':4,'Por contactar':5,'On hold':6,'Ganado':7,'Terminado':8,'No':9};
function bc(s){return {'Por contactar':'b-pc','Contactado':'b-co','Respondió':'b-re','Reunión':'b-ru','Propuesta':'b-pr','Ganado':'b-ga','Terminado':'b-tm','On hold':'b-oh','No':'b-no','En proceso':'b-ep'}[s]||'b-pc';}

// ---------- SEED: pipeline original ----------
const SEED=[
{id:1,emp:'Niu Sushi',cont:'Alan Schoihet',cargo:'Dueño',status:'No',canal:'',dias:30,notas:'No respondió'},
{id:2,emp:'Japi Jane',cont:'Mail de contacto',cargo:'Dueño',status:'No',canal:'',dias:30,notas:'No respondió'},
{id:3,emp:'Coca Cola',cont:'Romina Elgueta',cargo:'Mejora continua',status:'No',canal:'',dias:30,notas:'Eligieron otra empresa'},
{id:4,emp:'Benbo',cont:'Nicolás Borobio',cargo:'Dueño',status:'On hold',canal:'',dias:20,accion:'Esperar que se ordenen',notas:'Esperando a ordenarse'},

// ---------- LÓGICA BASE ----------
function getDias(c){
  if(c.fechaContacto){const d=Math.floor((new Date()-new Date(c.fechaContacto))/(1000*60*60*24));return Math.max(0,d);}
  return c.dias||0;
}
function timing(c){
  const d=getDias(c);
  if(c.status==='Respondió'){if(d<3)return{txt:'Espera '+(3-d)+'d más',color:'#22c55e'};if(d<=6)return{txt:'Momento ideal',color:'#f59e0b'};return{txt:'Urgente: escríbele',color:'#ef4444'};}
  if(c.status==='Contactado'){if(d<5)return{txt:'Seguimiento en '+(5-d)+'d',color:'#22c55e'};if(d<=8)return{txt:'Momento ideal',color:'#f59e0b'};return{txt:'Sin contacto hace mucho',color:'#ef4444'};}
  if(c.status==='Reunión'){if(d<=3)return{txt:'Reunión reciente',color:'#22c55e'};if(d<=7)return{txt:'Confirma siguientes pasos',color:'#f59e0b'};return{txt:'Urgente: confirma avance',color:'#ef4444'};}
  if(c.status==='Propuesta'){if(d<=5)return{txt:'Esperando decisión',color:'#f59e0b'};return{txt:'Pregunta qué falta',color:'#ef4444'};}
  return null;
}
function urg(c){
  const d=getDias(c);
  if(['No','Ganado','Terminado'].includes(c.status))return 'l';
  if(c.status==='Reunión'&&d>5)return 'h';
  if(c.status==='Respondió'&&d>3)return 'h';
  if(c.status==='En proceso'&&d>7)return 'h';
  if(['Contactado','Por contactar'].includes(c.status)&&d>14)return 'h';
  if(d>7)return 'm';return 'l';
}
function nivelCargo(c){
  const cargo=(c.cargo||'').toLowerCase();
  if(cargo.includes('dueño')||cargo.includes('ceo')||cargo.includes('founder')||cargo.includes('socio'))return 'dueño';
  if(cargo.includes('gerente general')||cargo.includes('director general'))return 'gg';
  if(cargo.includes('gerente')||cargo.includes('director')||cargo.includes('subgerente'))return 'gerente';
  if(cargo.includes('jefe')||cargo.includes('manager')||cargo.includes('mgr')||cargo.includes('coord'))return 'jefe';
  return 'general';
}

function calcScore(c){
  let score=0;const d=getDias(c);const cargo=(c.cargo||'').toLowerCase();const emp=(c.emp||'').toLowerCase();const notas=(c.notas||'').toLowerCase();
  if(c.status==='Respondió')score+=30;if(c.status==='Reunión')score+=28;if(c.status==='Propuesta')score+=32;
  if(c.status==='En proceso')score+=15;if(c.status==='Contactado')score+=5;if(c.status==='Por contactar')score+=3;
  if(c.canal==='Referido')score+=25;else if(c.canal==='Reunión')score+=10;else if(c.canal==='WhatsApp')score+=6;else if(c.canal==='LinkedIn'||c.canal==='Email')score+=3;
  const n=nivelCargo(c);
  if(n==='dueño')score+=18;else if(n==='gg')score+=15;else if(n==='gerente')score+=10;else if(n==='jefe')score+=5;
  const altaFit=['terminal','puerto','port','logis','transport','distribuc','bodega','supply','operac','granel','mineria','arauco'];
  const mediaFit=['food','aliment','chocolat','retail','tienda','wild','karün','bupa','clinica','ferreteri'];
  const bajaFit=['dhl','coca cola','id logistics','rfp'];
  if(altaFit.some(k=>emp.includes(k)))score+=15;else if(mediaFit.some(k=>emp.includes(k)))score+=8;else if(bajaFit.some(k=>emp.includes(k)))score-=10;
  const h=(c.historial||[]).length;if(h>=3)score+=10;else if(h>=2)score+=5;
  if(c.diagDolor&&c.diagDolor.length>10)score+=8;
  if(d>20&&c.status==='Contactado')score-=12;else if(d>10&&c.status==='Contactado')score-=5;
  if(c.status==='On hold')score-=15;
  if(notas.includes('no respondio')||notas.includes('no respondió'))score-=8;
  return Math.min(10,Math.max(1,Math.round(score/10)));
}
function calcBloqueador(c){
  const d=getDias(c);
  if(c.status==='Por contactar')return 'Falta el primer contacto';
  if(c.status==='On hold')return 'Decisión pausada';
  if(c.status==='Contactado'&&d>14)return 'Sin respuesta — mensaje frío';
  if(c.status==='Contactado'&&d>7)return 'Seguimiento pendiente';
  if(c.status==='Contactado')return 'Esperando respuesta';
  if(c.status==='Respondió'&&d>5)return 'Perdiendo momentum';
  if(c.status==='Respondió')return 'Falta el segundo toque';
  if(c.status==='Reunión'&&d>7)return 'Sin propuesta enviada';
  if(c.status==='Reunión')return 'Falta propuesta';
  if(c.status==='En proceso')return 'Definir si hay dolor real';
  if(c.status==='Propuesta')return 'Esperando decisión';
  return '';
}

function toggleSort(col){if(sortCol===col){sortDesc=!sortDesc;}else{sortCol=col;sortDesc=true;}renderContacts();}
function renderContacts(){
  const q=(document.getElementById('search-input').value||'').toLowerCase().trim();
  let list=activeFilter==='todos'?contacts.filter(c=>c.status!=='No'):contacts.filter(c=>c.status===activeFilter);
  if(q)list=contacts.filter(c=>(c.emp||'').toLowerCase().includes(q)||(c.cont||'').toLowerCase().includes(q));
  if(ownerFilter!=='todos')list=list.filter(c=>c.owner===ownerFilter);
  const sorted=[...list].sort((a,b)=>{
    if(sortCol==='emp')return sortDesc?a.emp.localeCompare(b.emp):b.emp.localeCompare(a.emp);
    if(sortCol==='status')return sortDesc?(ORD[a.status]??9)-(ORD[b.status]??9):(ORD[b.status]??9)-(ORD[a.status]??9);
    if(sortCol==='timing'){const r=x=>{const t=timing(x);if(!t)return 3;return t.color==='#ef4444'?0:t.color==='#f59e0b'?1:2;};return sortDesc?r(a)-r(b):r(b)-r(a);}
    if(sortCol==='dias')return sortDesc?getDias(b)-getDias(a):getDias(a)-getDias(b);
    if(sortCol==='accion'){const va=(a.accion||'').toLowerCase(),vb=(b.accion||'').toLowerCase();if(!va&&!vb)return 0;if(!va)return 1;if(!vb)return -1;return sortDesc?va.localeCompare(vb):vb.localeCompare(va);}
    return (ORD[a.status]??9)-(ORD[b.status]??9)||getDias(b)-getDias(a);
  });
  const arrow=col=>sortCol===col?(sortDesc?' ↓':' ↑'):' ↕';
  const thead='<thead><tr><th onclick="toggleSort(\'emp\')">Empresa'+arrow('emp')+'</th><th onclick="toggleSort(\'status\')">Status'+arrow('status')+'</th><th onclick="toggleSort(\'timing\')">Timing'+arrow('timing')+'</th><th onclick="toggleSort(\'dias\')" style="text-align:center">Días'+arrow('dias')+'</th><th onclick="toggleSort(\'accion\')">Próxima acción'+arrow('accion')+'</th></tr></thead>';
  const rows=sorted.map(c=>{
    const u=urg(c),d=getDias(c),t=timing(c);
    return '<tr onclick="openDetail('+c.id+')">'+
      '<td><div class="td-emp">'+esc(c.emp)+'</div><div class="td-cont">'+esc(c.cont&&c.cont!=='-'?c.cont+(c.cargo&&c.cargo!=='-'?' · '+c.cargo:''):'')+'</div></td>'+
      '<td><span class="badge '+bc(c.status)+'">'+c.status+'</span></td>'+
      '<td>'+(t?'<span class="timing-txt" style="color:'+t.color+'">'+t.txt+'</span>':'<span style="color:#e2e8f0;font-size:10px">—</span>')+'</td>'+
      '<td style="text-align:center"><span class="td-dias'+(u==='h'?' hot':'')+'">'+(d===0?'hoy':d+'d')+'</span></td>'+
      '<td><span style="font-size:11px;color:#64748b">'+esc(c.accion||'—')+'</span></td></tr>';
  }).join('');
  document.getElementById('clist').innerHTML=thead+'<tbody>'+(rows||'<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:1.5rem">Sin contactos en este filtro. Agrega uno con + Nuevo contacto.</td></tr>')+'</tbody>';
}

function renderTips(){
  const box=document.getElementById('tips-grid');
  const activos=contacts.filter(c=>!['No','Ganado','Terminado'].includes(c.status));
  const dia=new Date().getDay();const tips=[];
  const tipsDia={1:{i:'📅',l:'Lunes: activa el pipeline',x:'Los decisores revisan su semana y están más receptivos. Prioriza referidos y quienes abrieron tu email.'},2:{i:'🔥',l:'Martes: mejor día para escribir',x:'Martes y miércoles tienen la tasa de respuesta más alta en B2B. Haz seguimientos a quienes llevan más de 5 días.'},3:{i:'🔥',l:'Miércoles: día peak de respuesta',x:'Mayor tasa de apertura B2B de la semana. Escríbele a los que abrieron tu email y aún no responden.'},4:{i:'📞',l:'Jueves: cierra reuniones',x:'Ideal para confirmar reuniones de la próxima semana. Si tienes contactos en Reunión sin fecha, hoy es el día.'},5:{i:'⚡',l:'Viernes: seguimiento express',x:'Mensajes cortos y directos. Guarda las propuestas largas para la próxima semana.'},6:{i:'😴',l:'Sábado: planifica el lunes',x:'Revisa el pipeline, actualiza estados y prepara los mensajes del lunes.'},0:{i:'🗓️',l:'Domingo: prepara tu semana',x:'Revisa quién lleva más de 7 días sin contacto y prepara 3 mensajes para el lunes.'}};
  tips.push({icono:tipsDia[dia].i,label:tipsDia[dia].l,texto:tipsDia[dia].x});
  const abrieron=activos.filter(c=>c.status==='Respondió').sort((a,b)=>getDias(b)-getDias(a));
  const enReunion=activos.filter(c=>c.status==='Reunión').sort((a,b)=>getDias(b)-getDias(a));
  const referidos=activos.filter(c=>c.canal==='Referido'&&c.status==='Por contactar');
  const estancados=activos.filter(c=>c.status==='Contactado'&&getDias(c)>10).sort((a,b)=>getDias(b)-getDias(a));
  if(abrieron.length>0){
    const n=abrieron.slice(0,2).map(c=>(c.cont&&c.cont!=='-'?c.cont.split(' ')[0]:'')+' ('+c.emp+')').join(' y ');
    tips.push({icono:'🎯',label:'Escribe hoy: mostraron interés',texto:n+(abrieron.length>2?' y '+(abrieron.length-2)+' más':'')+' leyeron tu mensaje y no respondieron. El segundo toque tiene mucha más probabilidad de éxito. Toca el contacto para generar el mensaje.',id:abrieron[0].id});
  }else if(enReunion.length>0){
    const c=enReunion[0];
    tips.push({icono:'💼',label:'Reunión sin cierre: '+c.emp,texto:(c.cont?c.cont.split(' ')[0]:'')+' lleva '+getDias(c)+' días desde la reunión sin propuesta. Cada día baja la probabilidad de cierre.',id:c.id});
  }else if(referidos.length>0){
    tips.push({icono:'🤝',label:'Referidos sin contactar',texto:referidos.length+' referido(s) esperando: '+referidos.slice(0,2).map(c=>c.emp).join(' y ')+'. Cierran mucho más que el contacto frío.',id:referidos[0].id});
  }else if(estancados.length>0){
    const c=estancados[0];
    tips.push({icono:'⚠️',label:'Contacto estancado: '+c.emp,texto:getDias(c)+' días sin respuesta. Momento del segundo toque: corto, sin volver a explicar nada.',id:c.id});
  }
  const reuUrg=enReunion.filter(c=>getDias(c)>5);
  const sinDolor=activos.filter(c=>(!c.diagDolor||!c.diagDolor.length)&&['Reunión','Respondió','En proceso'].includes(c.status));
  if(reuUrg.length>0){
    tips.push({icono:'🚨',label:'Reunión(es) sin propuesta',texto:reuUrg.map(c=>c.emp).join(', ')+': tuviste reunión pero no has enviado propuesta. Sin propuesta no hay cierre.',id:reuUrg[0].id});
  }else if(sinDolor.length>0){
    tips.push({icono:'🔍',label:'Diagnostica antes de proponer',texto:sinDolor.slice(0,2).map(c=>c.emp).join(' y ')+' están avanzados sin dolor documentado. Sin dolor claro, la propuesta no tiene ancla.',id:sinDolor[0].id});
  }else{
    tips.push({icono:'💡',label:'Pipeline saludable',texto:'Mantén el volumen: agrega 2-3 contactos nuevos por semana para asegurar cierres sostenidos.'});
  }
  box.innerHTML=tips.map(t=>'<div class="tip-item'+(t.id?' clickable" onclick="openDetail('+t.id+')':'"')+'"><div class="tip-ico">'+t.icono+'</div><div><div class="tip-label">'+t.label+'</div><div class="tip-text">'+t.texto+'</div></div></div>').join('');
}

function isoWeek(dstr){
  const d=new Date(dstr+'T00:00:00');if(isNaN(d))return '';
  const t=new Date(d.valueOf());const dayn=(d.getDay()+6)%7;
  t.setDate(t.getDate()-dayn+3);const firstThu=t.valueOf();
  t.setMonth(0,1);if(t.getDay()!==4)t.setMonth(0,1+((4-t.getDay())+7)%7);
  return 'W'+(1+Math.round((firstThu-t)/604800000));
}
const MESES_L={'01':'Enero','02':'Febrero','03':'Marzo','04':'Abril','05':'Mayo','06':'Junio','07':'Julio','08':'Agosto','09':'Septiembre','10':'Octubre','11':'Noviembre','12':'Diciembre'};

function bitaFiltered(list){

function renderResumenHoras(){
  const box=document.getElementById('bita-resumen-interno');if(!box)return;
  const conBita=contacts.filter(x=>x.bitacora&&x.bitacora.length);
  const weeks=[...new Set(conBita.flatMap(x=>x.bitacora.filter(e=>(parseFloat(e.minutos)||0)>0).map(e=>isoWeek(e.fecha)).filter(Boolean)))].sort((a,b)=>parseInt(a.slice(1))-parseInt(b.slice(1)));
  const fh=m=>(m/60).toFixed(1).replace('.',',');
  const rows=conBita.map(x=>{
    const perW=weeks.map(w=>(x.bitacora||[]).filter(e=>isoWeek(e.fecha)===w).reduce((s,e)=>s+(parseFloat(e.minutos)||0),0));
    return {emp:x.emp,perW,tot:perW.reduce((s,v)=>s+v,0)};
  }).sort((a,b)=>a.emp.localeCompare(b.emp));
  if(!rows.length||!weeks.length){box.style.display='none';return;}
  box.style.display='block';
  const totW=weeks.map((w,i)=>rows.reduce((s,r)=>s+r.perW[i],0));
  const grand=totW.reduce((s,v)=>s+v,0);
  box.innerHTML='<div class="hrs-title">Horas por cliente</div><div style="overflow-x:auto"><table class="hrs-table"><thead><tr><th class="hl">Cliente</th>'+
    weeks.map(w=>'<th>'+w+'</th>').join('')+'<th class="hrs-tot">HH</th></tr></thead><tbody>'+
    rows.map(r=>'<tr><td class="hl" style="font-weight:600">'+esc(r.emp)+'</td>'+r.perW.map(v=>'<td'+(v?'':' class="hrs-zero"')+'>'+fh(v)+'</td>').join('')+'<td class="hrs-tot">'+fh(r.tot)+'</td></tr>').join('')+
    '<tr class="hrs-total-row"><td class="hl">Total</td>'+totW.map(v=>'<td>'+fh(v)+'</td>').join('')+'<td class="hrs-tot">'+fh(grand)+'</td></tr>'+
    '</tbody></table></div>';
}

  document.getElementById('bita-table').innerHTML='<thead><tr><th>Fecha</th><th>Reunión / Comentarios</th><th>Participantes</th><th>Lugar</th><th style="text-align:center">Duración</th><th></th></tr></thead><tbody>'+(rows||'<tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:1.2rem">Sin entradas en este periodo.</td></tr>')+'</tbody>';

  const gv=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
  const tema=gv('b-tema');
  if(!tema){showToast('Ingresa el tema de la reunión');return;}
  const entry={fecha:gv('b-fecha')||new Date().toISOString().split('T')[0],tema,comentarios:gv('b-com'),participantes:gv('b-part'),lugar:gv('b-lugar'),minutos:parseFloat(gv('b-min'))||0};
  if(!c.bitacora)c.bitacora=[];
  const editing=bitaEditIdx!=null&&c.bitacora[bitaEditIdx];
  if(editing)c.bitacora[bitaEditIdx]=entry;else c.bitacora.push(entry);
  bitaEditIdx=null;
  ['b-tema','b-com','b-part','b-lugar','b-min','b-fecha'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  persist();renderBitacora();showToast(editing?'✅ Entrada actualizada':'✅ Entrada guardada');
}
function delBita(cid,idx){
  const c=contacts.find(x=>x.id===cid);if(!c||!c.bitacora)return;
  if(!confirm('¿Eliminar esta entrada de la bitácora?'))return;
  c.bitacora.splice(idx,1);
  if(bitaEditIdx===idx)bitaEditIdx=null;
  persist();renderBitacora();showToast('Entrada eliminada');
}

// ---------- DETALLE (todo en uno) ----------
function openDetail(id){
  detailId=id;
  const c=contacts.find(x=>x.id===id);if(!c)return;
  const m=document.getElementById('detail-modal');
  m.innerHTML=
    '<h3>'+esc(c.emp)+'</h3>'+
    '<div style="font-size:12px;color:#64748b;margin-bottom:10px">'+esc(c.cont&&c.cont!=='-'?c.cont:'Sin contacto')+(c.cargo&&c.cargo!=='-'?' · '+esc(c.cargo):'')+(c.ciudad?' · '+esc(c.ciudad):'')+'</div>'+
    '<div class="detail-top">'+
      '<select id="d-status" onchange="changeStatus()">'+['Por contactar','Contactado','Respondió','Reunión','Propuesta','Ganado','Terminado','En proceso','On hold','No'].map(s=>'<option'+(c.status===s?' selected':'')+'>'+s+'</option>').join('')+'</select>'+
      '<input type="date" id="d-fecha-top" value="'+esc(c.fechaContacto)+'" onchange="changeFecha()" title="Fecha del último contacto">'+
      '<span style="font-size:11px;color:#94a3b8" id="d-dias-txt">'+getDias(c)+' días · '+(c.canal||'sin canal')+'</span>'+
      '<span id="d-termino-wrap" style="display:'+(c.status==='Terminado'?'inline-flex':'none')+';align-items:center;gap:5px"><span style="font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.4px">Término</span><input type="date" id="d-termino" value="'+esc(c.fechaTermino||'')+'" onchange="changeTermino()"></span>'+
    '</div>'+
    '<div class="coach-block">'+
      '<div class="coach-hdr"><span class="t">🎯 Coach</span><button class="mini-btn" onclick="regenCoach()">↻ Regenerar</button></div>'+
      '<div class="loading-line" id="coach-loading" style="display:none"><span class="spinner"></span>El coach está analizando a '+esc(c.emp)+'...</div>'+
      '<div class="coach-reco" id="coach-reco"></div>'+
      '<div class="coach-msg" id="coach-msg"></div>'+
      '<div class="coach-actions"><button class="mini-btn primary" onclick="copyMsg()">📋 Copiar mensaje</button></div>'+
    '</div>'+
    '<div class="dsec" id="sec-fr"><div class="dsec-hdr" onclick="toggleSec(\'sec-fr\')"><span class="t">⚖️ Francisco mode — negociación</span><span>▾</span></div><div class="dsec-body" id="fr-body"></div></div>'+
    '<div class="dsec" id="sec-hist"><div class="dsec-hdr" onclick="toggleSec(\'sec-hist\')"><span class="t">📋 Historial ('+(c.historial||[]).length+')</span><span>▾</span></div><div class="dsec-body">'+
      '<div id="hist-entries"></div>'+
      '<div class="hist-add"><select class="hist-sel" id="hist-type"><option>Email</option><option>LinkedIn</option><option>WhatsApp</option><option>Llamada</option><option>Reunión</option><option>Nota</option></select><input class="hist-input" id="hist-input" placeholder="¿Qué pasó?" onkeydown="if(event.key===\'Enter\')addHist()"><button class="mini-btn primary" onclick="addHist()">+</button></div>'+
    '</div></div>'+
    '<div class="dsec" id="sec-datos"><div class="dsec-hdr" onclick="toggleSec(\'sec-datos\')"><span class="t">✏️ Datos del contacto</span><span>▾</span></div><div class="dsec-body">'+
      '<div class="field-row"><div class="field"><label>Contacto</label><input id="d-cont" value="'+esc(c.cont)+'"></div><div class="field"><label>Cargo</label><input id="d-cargo" value="'+esc(c.cargo)+'"></div></div>'+
      '<div class="field-row"><div class="field"><label>Canal</label><select id="d-canal">'+['','Email','LinkedIn','WhatsApp','Llamada','Referido','Reunión'].map(x=>'<option value="'+x+'"'+(c.canal===x?' selected':'')+'>'+(x||'-')+'</option>').join('')+'</select></div><div class="field"><label>Ciudad</label><input id="d-ciudad" value="'+esc(c.ciudad)+'"></div></div>'+
      '<div class="field"><label>Cliente de</label><select id="d-owner">'+['','Jael','Rafa'].map(x=>'<option value="'+x+'"'+(c.owner===x?' selected':'')+'>'+(x||'Sin asignar')+'</option>').join('')+'</select></div>'+
      '<div class="field-row"><div class="field"><label>UF/hora</label><input id="d-uf" type="number" step="0.1" value="'+(c.uf||'')+'"></div><div class="field"><label>Horas est.</label><input id="d-horas" type="number" value="'+(c.horas||'')+'"></div></div>'+
      '<div class="field"><label>Email</label><input id="d-email" value="'+esc(c.email)+'"></div>'+
      '<div class="field"><label>Próxima acción</label><input id="d-accion" value="'+esc(c.accion)+'"></div>'+
      '<div class="field"><label>Notas</label><textarea id="d-notas">'+esc(c.notas)+'</textarea></div>'+
      '<div class="field"><label>Contexto del contacto (quién es, cómo piensa)</label><textarea id="d-contexto">'+esc(c.contexto)+'</textarea></div>'+
      '<div class="field"><label>Dolor documentado</label><textarea id="d-dolor">'+esc(c.diagDolor)+'</textarea></div>'+
      '<button class="mini-btn primary" onclick="saveDetail()">Guardar datos</button>'+
    '</div></div>'+
    '<div class="modal-btns"><button class="btn-del" onclick="deleteContact()">Eliminar</button><button class="btn-c" onclick="closeDetail()">Cerrar</button></div>';
  document.getElementById('fr-body').innerHTML='<div style="margin-bottom:8px;display:flex;align-items:center;gap:8px"><button class="mini-btn" onclick="genFrancisco()">⚡ '+(c.franJugada?'Regenerar jugada para este caso':'Jugada específica para este caso')+'</button><span id="fr-loading" style="display:none;font-size:11px;color:#94a3b8"><span class="spinner"></span>pensando la jugada...</span></div><div id="fr-ai">'+(c.franJugada?'<div class="fr-card" style="border-left-color:#7c3aed;background:#f5f3ff"><div class="ft" style="color:#7c3aed">⚡ Jugada para '+esc(c.emp)+'</div><div class="fi" style="white-space:pre-wrap">'+esc(c.franJugada)+'</div></div>':'')+'</div>'+franciscoCards(c).map(card=>'<div class="fr-card" style="border-left-color:'+card.color+'"><div class="ft" style="color:'+card.color+'">'+card.t+'</div>'+card.items.map(i=>'<div class="fi">— '+i+'</div>').join('')+'</div>').join('');
  renderHistEntries(c);
  document.getElementById('detail-overlay').classList.add('open');
  generarCoach(c,false);
}
function toggleSec(id){document.getElementById(id).classList.toggle('open');}
function closeDetail(){document.getElementById('detail-overlay').classList.remove('open');detailId=null;renderAll();}
function regenCoach(){const c=contacts.find(x=>x.id===detailId);if(c)generarCoach(c,true);}
function copyMsg(){
  const txt=(document.getElementById('coach-msg').textContent||'').trim();
  if(!txt){showToast('Aún no hay mensaje generado');return;}
  navigator.clipboard.writeText(txt).then(()=>showToast('✅ Mensaje copiado')).catch(()=>showToast('Copia manualmente'));
}
function changeStatus(){
  const c=contacts.find(x=>x.id===detailId);if(!c)return;
  const nuevo=document.getElementById('d-status').value;
  if(nuevo!==c.status){
    c.status=nuevo;
    c.diagReal='';c.diagAccion='';
    const tw=document.getElementById('d-termino-wrap');
    if(nuevo==='Terminado'){
      if(!c.fechaTermino){c.fechaTermino=new Date().toISOString().split('T')[0];const ti=document.getElementById('d-termino');if(ti)ti.value=c.fechaTermino;}
      if(tw)tw.style.display='inline-flex';
    }else if(tw)tw.style.display='none';
    if(!c.historial)c.historial=[];
    c.historial.push({fecha:new Date().toISOString().split('T')[0],tipo:'Nota',texto:'Cambio de etapa a: '+nuevo});
    persist();
    showToast('Etapa actualizada');
    generarCoach(c,true);
  }
}
function changeTermino(){
  const c=contacts.find(x=>x.id===detailId);if(!c)return;
  c.fechaTermino=document.getElementById('d-termino').value;
  persist();showToast('Fecha de término guardada');
}
function changeFecha(){
  const c=contacts.find(x=>x.id===detailId);if(!c)return;
  const nueva=document.getElementById('d-fecha-top').value;
  if(nueva===c.fechaContacto)return;
  c.fechaContacto=nueva;
  c.diagReal='';c.diagAccion='';
  const txt=document.getElementById('d-dias-txt');
  if(txt)txt.textContent=getDias(c)+' días · '+(c.canal||'sin canal');
  persist();
  showToast('Fecha actualizada');
  generarCoach(c,true);
}
function renderHistEntries(c){
  const entries=(c.historial||[]).slice().reverse();
  document.getElementById('hist-entries').innerHTML=entries.length?entries.map(e=>'<div class="hist-entry"><span class="hist-type">'+e.tipo+'</span><span class="hist-date">'+e.fecha+'</span><div class="hist-text">'+esc(e.texto)+'</div></div>').join(''):'<div style="font-size:12px;color:#94a3b8;padding:4px 0">Sin historial todavía.</div>';
}
function addHist(){
  const txt=document.getElementById('hist-input').value.trim();if(!txt)return;
  const c=contacts.find(x=>x.id===detailId);if(!c)return;
  if(!c.historial)c.historial=[];
  c.historial.push({fecha:new Date().toISOString().split('T')[0],tipo:document.getElementById('hist-type').value,texto:txt});
  c.fechaContacto=new Date().toISOString().split('T')[0];
  document.getElementById('hist-input').value='';
  persist();renderHistEntries(c);showToast('✅ Guardado');
}
function saveDetail(){
  const c=contacts.find(x=>x.id===detailId);if(!c)return;
  const gv=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
  const prevCanal=c.canal,prevCargo=c.cargo;
  c.cont=gv('d-cont');c.cargo=gv('d-cargo');c.canal=document.getElementById('d-canal').value;
  c.ciudad=gv('d-ciudad');c.owner=document.getElementById('d-owner').value;
  c.uf=parseFloat(gv('d-uf'))||0;c.horas=parseInt(gv('d-horas'))||0;
  c.email=gv('d-email');c.accion=gv('d-accion');c.notas=gv('d-notas');
  c.contexto=gv('d-contexto');c.diagDolor=gv('d-dolor');
  if(prevCanal!==c.canal||prevCargo!==c.cargo){c.diagReal='';c.diagAccion='';}
  persist();showToast('✅ Datos guardados');
}
function deleteContact(){
  if(!detailId||!confirm('¿Eliminar este contacto?'))return;
  contacts=contacts.filter(x=>x.id!==detailId);
  persist();closeDetail();showToast('Eliminado');
}

// ---------- NUEVO CONTACTO ----------
function openAdd(){
  ['a-emp','a-accion','a-cont','a-cargo','a-ciudad','a-email','a-notas'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  document.getElementById('a-status').value='Por contactar';
  document.getElementById('a-canal').value='';
  document.getElementById('a-owner').value='';
  document.getElementById('add-more').style.display='none';
  document.getElementById('add-more-link').textContent='+ Más campos (contacto, cargo, ciudad...)';
  document.getElementById('add-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('a-emp').focus(),50);
}
function toggleAddMore(){
  const m=document.getElementById('add-more');
  const open=m.style.display==='none';
  m.style.display=open?'block':'none';
  document.getElementById('add-more-link').textContent=open?'− Menos campos':'+ Más campos (contacto, cargo, ciudad...)';
}
function closeAdd(){document.getElementById('add-overlay').classList.remove('open');}
function saveAdd(){
  const emp=document.getElementById('a-emp').value.trim();
  if(!emp){showToast('Ingresa el nombre de la empresa');return;}
  const gv=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
  const c=normalize({id:nextId++,emp,status:document.getElementById('a-status').value,canal:document.getElementById('a-canal').value,accion:gv('a-accion'),cont:gv('a-cont'),cargo:gv('a-cargo'),ciudad:gv('a-ciudad'),email:gv('a-email'),notas:gv('a-notas'),owner:document.getElementById('a-owner').value,fechaContacto:document.getElementById('a-status').value!=='Por contactar'?new Date().toISOString().split('T')[0]:''});
  contacts.push(c);
  persist();closeAdd();renderAll();showToast('✅ '+emp+' agregado');
  openDetail(c.id);
}

// ---------- EXPORT / IMPORT ----------
function exportData(){
  const json=JSON.stringify({contacts,nextId,ownersInit,rafaInit,fixInit,bitaInit},null,1);
  navigator.clipboard.writeText(json).then(()=>showToast('✅ Pipeline copiado al portapapeles (JSON)')).catch(()=>{
    const blob=new Blob([json],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sales-coach-backup.json';a.click();
  });
}
function openImport(){document.getElementById('import-text').value='';document.getElementById('import-overlay').classList.add('open');}
function closeImport(){document.getElementById('import-overlay').classList.remove('open');}
function doImport(){
  try{
    const d=JSON.parse(document.getElementById('import-text').value);
    if(!d.contacts||!Array.isArray(d.contacts))throw new Error('formato');
    const merge=document.getElementById('import-merge').checked;
    if(merge){
      const nuevos=d.contacts.map(c=>{const n=normalize(c);n.id=nextId++;return n;});
      contacts=contacts.concat(nuevos);
      persist();closeImport();renderAll();showToast('✅ '+nuevos.length+' contactos agregados');
    }else{
      contacts=d.contacts.map(normalize);nextId=d.nextId||Math.max(...contacts.map(c=>c.id))+1;
      if(typeof d.ownersInit!=='undefined')ownersInit=!!d.ownersInit;
      if(typeof d.rafaInit!=='undefined')rafaInit=!!d.rafaInit;
      if(typeof d.fixInit!=='undefined')fixInit=!!d.fixInit;
      persist();closeImport();renderAll();showToast('✅ Pipeline reemplazado: '+contacts.length+' contactos');
    }
  }catch(e){showToast('JSON inválido — revisa el formato');}
}

// ---------- UTIL ----------
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
['add-overlay','detail-overlay','import-overlay'].forEach(id=>{document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});});
const now=new Date();
document.getElementById('day-pill').textContent=DIAS[now.getDay()]+' '+now.getDate()+'/'+String(now.getMonth()+1).padStart(2,'0');

(function init(){
  loadData();
  renderAll();
})();
</script>
